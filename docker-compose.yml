services:
  branchborn:
    build: .
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - branchborn-data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  branchborn-data:
